      /** --- 通訊與時間邏輯 --- **/
      async function fetchWithRetry(url, options, retries = 5, backoff = 1000) {
        try {
          const response = await fetch(url, options);
          if (options && options.mode === "no-cors" && response.status === 0) return { status: "success" };
          const text = await response.text();
          if (text.trim().startsWith("<!DOCTYPE")) throw new Error("資料庫格式錯誤");
          return JSON.parse(text);
        } catch (error) {
          if (retries > 0) {
            await new Promise((resolve) => setTimeout(resolve, backoff));
            return fetchWithRetry(url, options, retries - 1, backoff * 2);
          }
          throw error;
        }
      }

      function getDayIndex(dayChar) {
        return ["日", "一", "二", "三", "四", "五", "六"].indexOf(dayChar);
      }

      function expandDayRange(startIdx, endIdx) {
        const days = [];
        if (startIdx < 0 || endIdx < 0) return days;
        let current = startIdx;
        while (true) {
          days.push(current);
          if (current === endIdx) break;
          current = (current + 1) % 7;
        }
        return days;
      }

      function parseWeeklyHours(openingHours) {
        if (!openingHours || !/(週|星期)[日一二三四五六]/.test(openingHours)) return [];
        const labelRegex = /(週|星期)([日一二三四五六])(?:\s*(?:至|到|-|–|~)\s*(?:週|星期)?([日一二三四五六]))?/g;
        const matches = [...openingHours.matchAll(labelRegex)];
        return matches
          .map((match, idx) => {
            const next = matches[idx + 1];
            const raw = openingHours
              .slice(match.index, next ? next.index : openingHours.length)
              .trim()
              .replace(/^[,，;；\s]+|[,，;；\s]+$/g, "");
            const startIdx = getDayIndex(match[2]);
            const endIdx = getDayIndex(match[3] || match[2]);
            const content =
              raw
                .slice(match[0].length)
                .replace(/^[\s:：,，;；-]+/, "")
                .trim() || "休息";
            return {
              label: match[0],
              content,
              days: expandDayRange(startIdx, endIdx),
            };
          })
          .filter((item) => item.days.length);
      }

      function formatHoursContent(content) {
        return String(content || "休息")
          .split(/[,，]\s*/)
          .filter(Boolean)
          .join(" / ");
      }

      function formatDayLabel(label) {
        const shortLabel = String(label || "").replace(/星期/g, "週");
        const rangeMatch = shortLabel.match(/週([日一二三四五六])(?:至|到|-|–|~)週?([日一二三四五六])/);
        if (rangeMatch) return `${rangeMatch[1]}-${rangeMatch[2]}`;
        return shortLabel.length > 1 ? shortLabel.slice(-2) : shortLabel;
      }

      function getTodayHoursText(openingHours) {
        if (!openingHours || openingHours === "未填寫" || openingHours === "請見地圖") return "未提供時間";
        try {
          const now = new Date();
          const currentDay = now.getDay();
          const parsed = parseWeeklyHours(openingHours);
          const today = parsed.find((item) => item.days.includes(currentDay));
          if (today) return `${DAY_NAMES[currentDay]}: ${today.content}`;
          return openingHours.split("\n")[0];
        } catch (e) {
          return openingHours;
        }
      }

      function parseAndCheckRanges(text, currentMin) {
        if (!text) return false;
        if (text.includes("休息") || text.includes("歇業") || text.includes("公休")) return false;
        const timeRanges = text.split(/[,，;\s/]/);
        for (let range of timeRanges) {
          const match = range.match(/(\d{1,2}):(\d{2})[-–—~](\d{1,2}):(\d{2})/);
          if (!match) continue;
          const startMin = parseInt(match[1]) * 60 + parseInt(match[2]);
          const endMin = parseInt(match[3]) * 60 + parseInt(match[4]);
          if (startMin <= endMin) {
            if (currentMin >= startMin && currentMin <= endMin) return true;
          } else {
            if (currentMin >= startMin || currentMin <= endMin) return true;
          }
        }
        return false;
      }

      function checkIsOpen(openingHours) {
        if (!openingHours || openingHours === "未填寫" || openingHours === "請見地圖") return false;
        try {
          const now = new Date();
          const currentMin = now.getHours() * 60 + now.getMinutes();
          return parseAndCheckRanges(getTodayHoursText(openingHours), currentMin);
        } catch (e) {
          return false;
        }
      }

      function OpeningHoursDropdown({ hours }) {

        const todayFullLine = getTodayHoursText(safeHours);

        return (

                  const isToday = line.days.includes(currentDay);

                  return (

                      key={idx}

                        {/* 將內容根據逗號拆分為多行 */}

      function normalizeDistrict(...values) {
        const collectText = (value) => {
          if (value === undefined || value === null) return [];
          if (Array.isArray(value)) return value.flatMap(collectText);
          if (typeof value === "object") return Object.values(value).flatMap(collectText);
          const text = String(value).trim();
          return text ? [text] : [];
        };

        const candidates = values.flatMap(collectText);
        if (!candidates.length) return "";

        const exact = candidates.find((value) => DISTS.includes(value));
        if (exact) return exact;

        for (const value of candidates) {
          const compact = value.replace(/\s+/g, "");
          const matched = DISTS.find((dist) => dist !== "其他" && compact.includes(dist));
          if (matched) return matched;

          const districtLike = compact.match(/[\u4e00-\u9fff]{1,5}區/);
          if (districtLike && DISTS.includes(districtLike[0])) return districtLike[0];
        }

        return "";
      }

      function getRecordTime(r) {
        const values = [
          r?.created_at,
          r?.createdAt,
          r?.created_time,
          r?.createdTime,
          r?.timestamp,
          r?.date,
          r?.["新增時間"],
          r?.["建立時間"],
          r?.["日期"],
          r?.["時間"],
        ];

        for (const value of values) {
          if (value === undefined || value === null || value === "") continue;
          if (typeof value === "number" && Number.isFinite(value)) return value < 100000000000 ? value * 1000 : value;

          const raw = String(value).trim();
          const numeric = Number(raw);
          if (Number.isFinite(numeric) && numeric > 1000000000) return numeric < 100000000000 ? numeric * 1000 : numeric;

          const parsed = Date.parse(raw);
          if (Number.isFinite(parsed)) return parsed;
        }

        const idTime = String(r?.id || "").match(/(?:^|_)(\d{13})(?:$|_)/);
        return idTime ? Number(idTime[1]) : 0;
      }

      function resizeImageFile(file, maxSize = 1200, quality = 0.82) {
        return new Promise((resolve, reject) => {
          if (!file) return resolve("");
          if (!file.type || !file.type.startsWith("image/")) return reject(new Error("請選擇圖片檔"));

          const reader = new FileReader();
          reader.onerror = () => reject(new Error("圖片讀取失敗"));
          reader.onload = () => {
            const img = new Image();
            img.onerror = () => reject(new Error("圖片格式無法讀取"));
            img.onload = () => {
              const scale = Math.min(1, maxSize / Math.max(img.width, img.height));
              const canvas = document.createElement("canvas");
              canvas.width = Math.round(img.width * scale);
              canvas.height = Math.round(img.height * scale);
              const ctx = canvas.getContext("2d");
              ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
              resolve(canvas.toDataURL("image/jpeg", quality));
            };
            img.src = reader.result;
          };
          reader.readAsDataURL(file);
        });
      }

          }
        });

          try {
            const json = await fetchWithRetry(`${GAS_URL}?t=${Date.now()}`);
            if (json.status === "success") setData((json.data || []).map(normalizeRecord));
          } catch (e) {
            console.error("載入失敗:", e);

            if (isInit) setLoading(false);
          }
        };

        React.useEffect(() => {
          loadData(true);
          const timer = setInterval(() => loadData(false), 30000);
          return () => clearInterval(timer);
        }, []);

        React.useEffect(() => {
          localStorage.setItem(LS_KEY + "_del", JSON.stringify([...deletedIds]));
          localStorage.setItem(LS_KEY + "_edit", JSON.stringify(Array.from(editedItems.entries())));
        }, [deletedIds, editedItems]);

        const handleAction = async (action, r) => {
          const idStr = String(r.id || r);
          const record = typeof r === "object" ? normalizeRecord(r) : r;
          const payload = typeof record === "object" ? record : {};
          if (action === "add") setData((prev) => [record, ...prev]);
          if (action === "edit") setEditedItems((prev) => new Map(prev).set(idStr, record));
          if (action === "delete") {
            setDeletedIds((prev) => new Set(prev).add(idStr));
            setData((prev) => prev.filter((x) => String(x.id) !== idStr));
          }
          try {
            await fetchWithRetry(GAS_URL, {
              method: "POST",
              mode: "no-cors",
              headers: { "Content-Type": "text/plain" },
              body: JSON.stringify({ action, id: idStr, ...payload }),
            });
          } catch (e) {
            console.error(e);
          }
        };

        const allData = React.useMemo(() => {
          const map = new Map();
          data.forEach((r) => {
            const idStr = String(r.id);
            if (deletedIds.has(idStr)) return;
            const final = normalizeRecord(editedItems.has(idStr) ? editedItems.get(idStr) : r);
            if (final.name) map.set(final.name, final);
          });
          return Array.from(map.values());
        }, [data, deletedIds, editedItems]);

        const filtered = React.useMemo(
          () =>
            allData
              .map((r, index) => ({ r, index }))
              .filter(
                ({ r }) =>
                  (r.name + (r.district || "") + (r.category || "")).toLowerCase().includes(search.toLowerCase()) &&
                  (categoryF.size === 0 || categoryF.has(r.category)),
              )
              .sort((a, b) => {
                const diff = getRecordTime(a.r) - getRecordTime(b.r);
                if (diff !== 0) return sortOrder === "newest" ? -diff : diff;
                return sortOrder === "newest" ? a.index - b.index : b.index - a.index;
              })
              .map(({ r }) => r),
          [allData, search, categoryF, sortOrder],
        );

        const handleEdit = (r) => {
          setEditingR(r);
        };

        return (
          <div style={{ minHeight: "100vh", background: "var(--bg)", display: "flex", flexDirection: "column" }}>
            <nav
              style={{
                maxWidth: "1100px",
                width: "100%",
                margin: "auto",
                position: "sticky",
                top: 0,
                zIndex: 300,
                background: "rgba(24,24,24,0.92)",
                backdropFilter: "blur(20px)",
                height: 60,
                display: "flex",
                alignItems: "center",
                justifyContent: "space-between",
                padding: "0 20px",
                borderBottom: "1px solid rgba(255,255,255,0.06)",
              }}
            >
              <div style={{ color: "#fff", fontSize: 20, fontWeight: 900 }}>美食口袋名單</div>
              <button
                onClick={() => setShowAdd(true)}
                style={{
                  padding: "9px 15px",
                  borderRadius:"var(--btn-radius)",
                  background: "var(--red)",
                  color: "#fff",
                  border: "none",
                  fontWeight: 700,
                  cursor: "pointer",
                  display: "flex",
                  alignItems: "center",
                  gap: 4
                }}
              >
                <PlusIc s={16} />
                <span style={{
                  fontSize: "var(--btn-font-size)",
                }}>新增</span>
              </button>
            </nav>
            <div
              style={{
                maxWidth: 1100,
                margin: "0 auto",
                padding: "10px 20px",
                display: "flex",
                gap: 6,
                overflowX: "auto",
                scrollbarWidth: "none",
                width: "100%",
              }}
            >
              <CatPill active={categoryF.size === 0} onClick={() => setCategoryF(new Set())}>
                全部
              </CatPill>
              {[...new Set(allData.map((r) => r.category).filter(Boolean))].sort().map((c) => (
                <CatPill
                  key={c}
                  active={categoryF.has(c)}
                  onClick={() => {
                    const n = new Set(categoryF);
                    n.has(c) ? n.delete(c) : n.add(c);
                    setCategoryF(n);
                  }}
                >
                  {c}
                </CatPill>
              ))}
            </div>
            <div style={{ padding: "15px 20px", background: "rgba(24,24,24,0.7)", backdropFilter: "blur(12px)", WebkitBackdropFilter: "blur(12px)", position: "sticky", top: 60, zIndex: 200 }}>
              <div style={{ maxWidth: 1100, margin: "0 auto", display: "flex", gap: 10, alignItems: "center", flexWrap: "wrap" }}>
                <div style={{ flex: 1, minWidth: 180, position: "relative" }}>
                  <span style={{ position: "absolute", left: 12, top: "50%", transform: "translateY(-50%)", color: "rgba(255,255,255,0.3)" }}>
                    <SearchIc s={15} />
                  </span>
                  <input
                    value={search}
                    onChange={(e) => setSearch(e.target.value)}
                    placeholder="搜尋店名、區域、類型"
                    className="search-input"
                    style={{
                      width: "100%",
                      padding: "10px 38px",
                      borderRadius: 10,
                      background: "rgba(255,255,255,0.1)",
                      color: "#fff",
                      border: "none",
                      outline: "none",
                    }}
                  />
                </div>
                <select
                  value={sortOrder}
                  onChange={(e) => setSortOrder(e.target.value)}
                  className="hide-arrow"
                  style={{
                    height: 38,
                    padding: "0 10px",
                    borderRadius: 10,
                    background: "rgba(255,255,255,0.1)",
                    color: "#fff",
                    border: "none",
                    outline: "none",
                    fontSize: 13,
                    fontWeight: 700,
                    cursor: "pointer",
                  }}
                >
                  <option value="newest" style={{ color: "#111" }}>
                    新到舊
                  </option>
                  <option value="oldest" style={{ color: "#111" }}>
                    舊到新
                  </option>
                </select>
                <div style={{ display: "flex", background: "rgba(255,255,255,0.08)", borderRadius: 10, padding: 3 }}>
                  <button
                    onClick={() => setView("grid")}
                    style={{
                      padding: 8,
                      fontSize: 0,
                      borderRadius: 8,
                      border: "none",
                      background: view === "grid" ? "rgba(255,255,255,0.15)" : "transparent",
                      color: view === "grid" ? "#fff" : "rgba(255,255,255,0.4)",
                      cursor: "pointer",
                    }}
                  >
                    <GridIc />
                  </button>
                  <button
                    onClick={() => setView("list")}
                    style={{
                      padding: 8,
                      fontSize: 0,
                      borderRadius: 8,
                      border: "none",
                      background: view === "list" ? "rgba(255,255,255,0.15)" : "transparent",
                      color: view === "list" ? "#fff" : "rgba(255,255,255,0.4)",
                      cursor: "pointer",
                    }}
                  >
                    <ListIc />
                  </button>
                </div>
              </div>
            </div>
            <main style={{ flex: 1, padding: "20px", maxWidth: 1100, margin: "0 auto", width: "100%" }}>
              {loading ? (
                <div style={{ textAlign: "center", paddingTop: 100 }}>
                  <Loader2 s={32} />
                </div>
              ) : (
                <div
                  style={
                    view === "grid"
                      ? { display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(240px, 1fr))", gap: 16 }
                      : { display: "flex", flexDirection: "column", gap: 10 }
                  }
                >
                  {filtered.map((r) =>
                    view === "grid" ? <GridCard key={r.id} r={r} onOpen={setDetailR} /> : <ListItem key={r.id} r={r} onOpen={setDetailR} />,
                  )}
                </div>
              )}
            </main>
            {detailR && (
              <DetailModal r={detailR} onClose={() => setDetailR(null)} onDelete={(id) => handleAction("delete", id)} onEdit={handleEdit} />
            )}
            {showAdd && (
              <AddModal
                onClose={() => setShowAdd(false)}
                onSave={(r) => handleAction("add", r)}
                existingNames={new Set(allData.map((r) => r.name))}
              />
            )}
            {editingR && (
              <EditModal
                onClose={() => setEditingR(null)}
                onSave={(r) => handleAction("edit", r)}
                existingNames={new Set(allData.map((r) => r.name))}
                initialData={editingR}
              />
            )}
          </div>
        );
      }

      function CatPill({ active, onClick, children }) {
        return (
          <button
            onClick={onClick}
            style={{
              padding: "7px 16px",
              borderRadius: 99,
              border: "none",
              background: active ? "var(--red)" : "rgba(255,255,255,0.08)",
              color: active ? "#fff" : "rgba(255,255,255,0.65)",
              fontSize: 13,
              fontWeight: 600,
              cursor: "pointer",
              transition: "all 0.15s",
              whiteSpace: "nowrap",
              flexShrink: 0,
            }}
          >
            {children}
          </button>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
