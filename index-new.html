      /** --- 通訊與時間邏輯 --- **/
      async function fetchWithRetry(url, options, retries = 5, backoff = 1000) {
        try {
          const response = await fetch(url, options);
          if (options && options.mode === "no-cors" && response.status === 0) return { status: "success" };
          const text = await response.text();
          if (text.trim().startsWith("<!DOCTYPE")) throw new Error("資料庫格式錯誤");
          return JSON.parse(text);
        } catch (error) {
          if (retries > 0) {
            await new Promise((resolve) => setTimeout(resolve, backoff));
            return fetchWithRetry(url, options, retries - 1, backoff * 2);
          }
          throw error;
        }
      }

      function getTodayHoursText(openingHours) {
        if (!openingHours || openingHours === "未填寫" || openingHours === "請見地圖") return "未提供時間";
        try {
          const now = new Date();
          const currentDay = now.getDay();
          const currentDayName = DAY_NAMES[currentDay];
          if (openingHours.includes("週") || openingHours.includes("星期")) {
            const segments = openingHours.split(/[\n,;]/);
            for (let seg of segments) {
              if (seg.includes(currentDayName) || seg.includes(currentDayName.replace("週", "星期"))) return seg.trim();
              const rangeMatch = seg.match(/(週|星期)([一二三四五六日])至(週|星期)([一二三四五六日])/);
              if (rangeMatch) {
                const sIdx = DAY_NAMES.indexOf("週" + rangeMatch[2]);
                const eIdx = DAY_NAMES.indexOf("週" + rangeMatch[4]);
                if ((sIdx <= eIdx && currentDay >= sIdx && currentDay <= eIdx) || (sIdx > eIdx && (currentDay >= sIdx || currentDay <= eIdx)))
                  return seg.trim();
              }
            }
          }
          return openingHours.split("\n")[0];
        } catch (e) {
          return openingHours;
        }
      }

      function parseAndCheckRanges(text, currentMin) {
        if (!text) return false;
        if (text.includes("休息") || text.includes("歇業") || text.includes("公休")) return false;
        const timeRanges = text.split(/[,，;\s/]/);
        for (let range of timeRanges) {
          const match = range.match(/(\d{1,2}):(\d{2})[-–—~](\d{1,2}):(\d{2})/);
          if (!match) continue;
          const startMin = parseInt(match[1]) * 60 + parseInt(match[2]);
          const endMin = parseInt(match[3]) * 60 + parseInt(match[4]);
          if (startMin <= endMin) {
            if (currentMin >= startMin && currentMin <= endMin) return true;
          } else {
            if (currentMin >= startMin || currentMin <= endMin) return true;
          }
        }
        return false;
      }

      function checkIsOpen(openingHours) {
        if (!openingHours || openingHours === "未填寫" || openingHours === "請見地圖") return false;
        try {
          const now = new Date();
          const currentMin = now.getHours() * 60 + now.getMinutes();
          return parseAndCheckRanges(getTodayHoursText(openingHours), currentMin);
        } catch (e) {
          return false;
        }
      }

              >
                {allLines.map((line, idx) => {
                  const trimmedLine = line.trim();
                  const isToday = trimmedLine.includes(todayFullLine);

                  const match = trimmedLine.match(/^([^:：]+)[:：]\s*(.*)$/);
                  // 確認標籤含有星期字眼，否則視為純時間行
                  const hasDay = match && /[週星一二三四五六日]/.test(match[1]);
                  const rawLabel = hasDay ? match[1] : "";
                  const content = hasDay ? match[2] : trimmedLine;
                  const label = rawLabel.length > 1 ? rawLabel.slice(-2) : rawLabel;

                  return (
                    <div
                      key={idx}
                      style={{
                        display: "grid",
                        gridTemplateColumns: "35px 1fr", // 您要求的 35px
                        alignItems: "start",
                        fontWeight: isToday ? 800 : 400,
                        color: isToday ? "var(--red)" : "inherit",
                      }}

                      <span style={{ opacity: 0.75, textAlign: "left" }}>{label}</span>
                      <div style={{ display: "flex", flexDirection: "column", gap: "2px" }}>
                        {/* 將內容根據逗號拆分為多行 */}
                        <span>
                          {content
                            ? content
                                .split(/[,，]\s*/)
                                .filter(Boolean)
                                .join(" / ")
                            : "休息"}
                        </span>
                      </div>
                    </div>
                  );
                })}
              </div>
            )}
          </div>
        );
      }

      function FormModal({ onClose, onSave, existingNames, initialData }) {
        const isEdit = !!initialData;
        const [name, setName] = React.useState(initialData?.name || "");
        const [category, setCategory] = React.useState(initialData?.category || "");
        const [district, setDistrict] = React.useState(initialData?.district || "");
        const [rating, setRating] = React.useState(initialData?.rating || "4.0");
        const [openHours, setOpenHours] = React.useState(initialData?.opening_hours || "");
        const [mapLink, setMapLink] = React.useState(initialData?.map_link || "");
        const [note, setNote] = React.useState(initialData?.note || "");
        const [errors, setErrors] = React.useState({});
        const [analyzing, setAnalyzing] = React.useState(false);

        const handleAnalyze = async () => {
          if (!mapLink.trim()) return;
          setAnalyzing(true);
          try {
            const prompt = `任務：從指定的 Google Maps 網址提取店家資料。網址：${mapLink}。輸出必須回傳純 JSON，不含 Markdown。格式：{"name": "店名", "category": "類型", "district": "行政區", "rating": "評分", "openHours": "週一: 11:00-14:30...格式的一週時間", "note": "簡介"}`;
            const res = await fetchWithRetry(`https://generativelanguage.googleapis.com/v1beta/models/${modelName}:generateContent?key=${apiKey}`, {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({
                contents: [{ parts: [{ text: prompt }] }],
                tools: [{ google_search: {} }],
                generationConfig: { responseMimeType: "application/json" },
              }),
            });
            const content = JSON.parse(res.candidates[0].content.parts[0].text);
            if (content.name) setName(content.name);
            if (content.category && CATS.includes(content.category)) setCategory(content.category);
            if (content.district && DISTS.includes(content.district)) setDistrict(content.district);
            if (content.rating) setRating(parseFloat(content.rating).toFixed(1));
            if (content.openHours) setOpenHours(content.openHours);
            if (content.note) setNote(content.note);
          } catch (e) {
            console.error(e);
          } finally {
            setAnalyzing(false);
          }
        };

        function doConfirm() {
          if (!name.trim()) return setErrors({ name: "必填" });
          if (existingNames.has(name) && (!isEdit || initialData.name !== name)) return setErrors({ name: "已存在" });
          const finalCat = category || "其他";
          onSave({
            id: initialData?.id || "u_" + Date.now(),
            name: name.trim(),
            district: district || "其他",
            category: finalCat,
            type: finalCat,
            類型: finalCat,
            餐廳類型: finalCat,
            rating: parseFloat(rating).toFixed(1),
            opening_hours: openHours.trim() || "未填寫",
            is_open: "DYNAMIC",
            emoji: EMOJIS[finalCat] || "🍴",
            note: note.trim(),
            map_link: mapLink.trim() || "#",
            source: "custom",
          });
          onClose();
        }

        const fieldS = {
          width: "100%",
          padding: "10px 12px",
          borderRadius: 9,
          border: "1.5px solid #eee",
          fontSize: 13,
          background: "#f9f9f9",
          outline: "none",
          marginBottom: 10,
        };

        return (
          <div
            onClick={onClose}
            style={{
              position: "fixed",
              inset: 0,
              zIndex: 700,
              background: "rgba(10,10,10,0.78)",
              backdropFilter: "blur(8px)",
              display: "flex",
              alignItems: "flex-end",
              justifyContent: "center",
              animation: "fadeIn 0.15s ease",
            }}
          >
            <div
              onClick={(e) => e.stopPropagation()}
              style={{
                background: "var(--card)",
                borderRadius: "24px 24px 0 0",
                width: "100%",
                maxWidth: 480,
                maxHeight: "92vh",
                display: "flex",
                flexDirection: "column",
                animation: "slideUp 0.24s cubic-bezier(0.22,1,0.36,1)",
                boxShadow: "0 -8px 40px rgba(0,0,0,0.22)",
                overflow: "hidden",
              }}
            >
              <div style={{ padding: "20px", overflowY: "auto" }}>
                <div style={{ fontSize: 18, fontWeight: 800, marginBottom: 15 }}>新增/編輯餐廳</div>
                <label style={{ fontSize: 11, fontWeight: 700, color: "var(--red)", display: "block", marginBottom: 5 }}>AI 解析網址</label>
                <div style={{ display: "flex", gap: 8, marginBottom: 15 }}>
                  <input
                    value={mapLink}
                    onChange={(e) => setMapLink(e.target.value)}
                    placeholder="貼上網址..."
                    style={{ ...fieldS, marginBottom: 0, flex: 1 }}
                  />
                  <button
                    onClick={handleAnalyze}
                    disabled={analyzing}
                    style={{
                      padding: "0 15px",
                      borderRadius: 9,
                      background: "#333",
                      color: "#fff",
                      fontWeight: 700,
                      border: "none",
                      cursor: "pointer",
                    }}
                  >
                    {analyzing ? <Loader2 s={14} /> : "解析"}
                  </button>
                </div>
                <input
                  value={name}
                  onChange={(e) => setName(e.target.value)}
                  placeholder="店名 *"
                  style={{ ...fieldS, borderColor: errors.name ? "red" : "#eee" }}
                />
                <div style={{ display: "flex", gap: 10 }}>
                  <select value={category} onChange={(e) => setCategory(e.target.value)} style={fieldS}>
                    <option value="" disabled>
                      類型
                    </option>
                    {CATS.map((c) => (
                      <option key={c} value={c}>
                        {c}
                      </option>
                    ))}
                  </select>
                  <select value={district} onChange={(e) => setDistrict(e.target.value)} style={fieldS}>
                    <option value="" disabled>
                      區域
                    </option>
                    {DISTS.map((d) => (
                      <option key={d} value={d}>
                        {d}
                      </option>
                    ))}
                  </select>
                </div>
                <div style={{ display: "flex", gap: 10, alignItems: "center", marginBottom: 10 }}>
                  <div style={{ flex: 1 }}>
                    <label style={{ fontSize: 10 }}>評分</label>
                    <input
                      type="number"
                      step="0.1"
                      value={rating}
                      onChange={(e) => setRating(e.target.value)}
                      style={{ ...fieldS, marginBottom: 0 }}
                    />
                  </div>
                  <div style={{ flex: 2 }}>
                    <label style={{ fontSize: 10 }}>營業時間</label>
                    <input
                      value={openHours}
                      onChange={(e) => setOpenHours(e.target.value)}
                      placeholder="週一: 11:00-21:00"
                      style={{ ...fieldS, marginBottom: 0 }}
                    />
                  </div>
                </div>
                <textarea value={note} onChange={(e) => setNote(e.target.value)} placeholder="筆記..." style={{ ...fieldS, height: 80 }} />
                <button
                  onClick={doConfirm}
                  style={{
                    width: "100%",
                    padding: "14px",
                    borderRadius: 11,
                    background: "var(--red)",
                    color: "#fff",
                    fontWeight: 800,
                    border: "none",
                  }}
                >
                  儲存
                </button>
              </div>
            </div>
          </div>
        );
      }

      /** --- 主程式 --- **/
      function App() {
        const [data, setData] = React.useState([]);
        const [deletedIds, setDeletedIds] = React.useState(() => new Set(JSON.parse(localStorage.getItem(LS_KEY + "_del") || "[]")));
        const [editedItems, setEditedItems] = React.useState(() => {
          const raw = localStorage.getItem(LS_KEY + "_edit");
          try {
            return new Map(JSON.parse(raw || "[]"));
          } catch (e) {
            return new Map();
          }
        });
        const [loading, setLoading] = React.useState(true);
        const [search, setSearch] = React.useState("");
        const [detailR, setDetailR] = React.useState(null);
        const [showAdd, setShowAdd] = React.useState(false);
        const [editingR, setEditingR] = React.useState(null);
        const [categoryF, setCategoryF] = React.useState(new Set());
        const [view, setView] = React.useState("grid");

        const loadData = async (isInit = false) => {
          try {
            const json = await fetchWithRetry(`${GAS_URL}?t=${Date.now()}`);
            if (json.status === "success") setData((json.data || []).map(normalizeRecord));
          } catch (e) {
            console.error("載入失敗:", e);
          } finally {
            if (isInit) setLoading(false);
          }
        };

        React.useEffect(() => {
          loadData(true);
          const timer = setInterval(() => loadData(false), 30000);
          return () => clearInterval(timer);
        }, []);

        React.useEffect(() => {
          localStorage.setItem(LS_KEY + "_del", JSON.stringify([...deletedIds]));
          localStorage.setItem(LS_KEY + "_edit", JSON.stringify(Array.from(editedItems.entries())));
        }, [deletedIds, editedItems]);

        const handleAction = async (action, r) => {
          const idStr = String(r.id || r);
          const record = typeof r === "object" ? normalizeRecord(r) : r;
          const payload = typeof record === "object" ? record : {};
          if (action === "add") setData((prev) => [record, ...prev]);
          if (action === "edit") setEditedItems((prev) => new Map(prev).set(idStr, record));
          if (action === "delete") {
            setDeletedIds((prev) => new Set(prev).add(idStr));
            setData((prev) => prev.filter((x) => String(x.id) !== idStr));
          }
          try {
            await fetchWithRetry(GAS_URL, {
              method: "POST",
              mode: "no-cors",
              headers: { "Content-Type": "text/plain" },
              body: JSON.stringify({ action, id: idStr, ...payload }),
            });
          } catch (e) {
            console.error(e);
          }
        };

        const allData = React.useMemo(() => {
          const map = new Map();
          data.forEach((r) => {
            const idStr = String(r.id);
            if (deletedIds.has(idStr)) return;
            const final = normalizeRecord(editedItems.has(idStr) ? editedItems.get(idStr) : r);
            if (final.name) map.set(final.name, final);
          });
          return Array.from(map.values());
        }, [data, deletedIds, editedItems]);

        const filtered = allData.filter(
          (r) =>
            (r.name + (r.district || "") + (r.category || "")).toLowerCase().includes(search.toLowerCase()) &&
            (categoryF.size === 0 || categoryF.has(r.category)),
        );

        const handleEdit = (r) => {
          setEditingR(r);
        };

        return (
          <div style={{ minHeight: "100vh", background: "var(--bg)", display: "flex", flexDirection: "column" }}>
            <nav
              style={{
                maxWidth: "1100px",
                width: "100%",
                margin: "auto",
                position: "sticky",
                top: 0,
                zIndex: 300,
                background: "rgba(24,24,24,0.92)",
                backdropFilter: "blur(20px)",
                height: 60,
                display: "flex",
                alignItems: "center",
                justifyContent: "space-between",
                padding: "0 20px",
                borderBottom: "1px solid rgba(255,255,255,0.06)",
              }}
            >
              <div style={{ color: "#fff", fontSize: 18, fontWeight: 900 }}>大台北 Food</div>
              <button
                onClick={() => setShowAdd(true)}
                style={{
                  padding: "8px 15px",
                  borderRadius: 9,
                  background: "var(--red)",
                  color: "#fff",
                  border: "none",
                  fontWeight: 700,
                  cursor: "pointer",
                }}
              >
                新增
              </button>
            </nav>
            <div
              style={{
                maxWidth: 1100,
                margin: "0 auto",
                padding: "10px 20px",
                display: "flex",
                gap: 6,
                overflowX: "auto",
                scrollbarWidth: "none",
                width: "100%",
              }}
            >
              <CatPill active={categoryF.size === 0} onClick={() => setCategoryF(new Set())}>
                全部
              </CatPill>
              {[...new Set(allData.map((r) => r.category).filter(Boolean))].sort().map((c) => (
                <CatPill
                  key={c}
                  active={categoryF.has(c)}
                  onClick={() => {
                    const n = new Set(categoryF);
                    n.has(c) ? n.delete(c) : n.add(c);
                    setCategoryF(n);
                  }}
                >
                  {c}
                </CatPill>
              ))}
            </div>
            <div style={{ padding: "15px 20px", background: "rgba(24,24,24,0.7)", position: "sticky", top: 60, zIndex: 200 }}>
              <div style={{ maxWidth: 1100, margin: "0 auto", display: "flex", gap: 10, alignItems: "center" }}>
                <div style={{ flex: 1, position: "relative" }}>
                  <span style={{ position: "absolute", left: 12, top: "50%", transform: "translateY(-50%)", color: "rgba(255,255,255,0.3)" }}>
                    <SearchIc s={15} />
                  </span>
                  <input
                    value={search}
                    onChange={(e) => setSearch(e.target.value)}
                    placeholder="搜尋店名..."
                    style={{
                      width: "100%",
                      padding: "10px 38px",
                      borderRadius: 10,
                      background: "rgba(255,255,255,0.1)",
                      color: "#fff",
                      border: "none",
                      outline: "none",
                    }}
                  />
                </div>
                <div style={{ display: "flex", background: "rgba(255,255,255,0.08)", borderRadius: 10, padding: 3 }}>
                  <button
                    onClick={() => setView("grid")}
                    style={{
                      padding: 8,
                      fontSize:0,
                      borderRadius: 8,
                      border: "none",
                      background: view === "grid" ? "rgba(255,255,255,0.15)" : "transparent",
                      color: view === "grid" ? "#fff" : "rgba(255,255,255,0.4)",
                      cursor: "pointer",
                    }}
                  >
                    <GridIc />
                  </button>
                  <button
                    onClick={() => setView("list")}
                    style={{
                      padding: 8,
                      fontSize:0,
                      borderRadius: 8,
                      border: "none",
                      background: view === "list" ? "rgba(255,255,255,0.15)" : "transparent",
                      color: view === "list" ? "#fff" : "rgba(255,255,255,0.4)",
                      cursor: "pointer",
                    }}
                  >
                    <ListIc />
                  </button>
                </div>
              </div>
            </div>
            <main style={{ flex: 1, padding: "20px", maxWidth: 1100, margin: "0 auto", width: "100%" }}>
              {loading ? (
                <div style={{ textAlign: "center", paddingTop: 100 }}>
                  <Loader2 s={32} />
                </div>
              ) : (
                <div
                  style={
                    view === "grid"
                      ? { display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(240px, 1fr))", gap: 16 }
                      : { display: "flex", flexDirection: "column", gap: 10 }
                  }
                >
                  {filtered.map((r) =>
                    view === "grid" ? <GridCard key={r.id} r={r} onOpen={setDetailR} /> : <ListItem key={r.id} r={r} onOpen={setDetailR} />,
                  )}
                </div>
              )}
            </main>
            {detailR && (
              <DetailModal r={detailR} onClose={() => setDetailR(null)} onDelete={(id) => handleAction("delete", id)} onEdit={handleEdit} />
            )}
            {showAdd && (
              <FormModal
                onClose={() => setShowAdd(false)}
                onSave={(r) => handleAction("add", r)}
                existingNames={new Set(allData.map((r) => r.name))}
                initialData={null}
              />
            )}
            {editingR && (
              <FormModal
                onClose={() => setEditingR(null)}
                onSave={(r) => handleAction("edit", r)}
                existingNames={new Set(allData.map((r) => r.name))}
                initialData={editingR}
              />
            )}
          </div>
        );
      }

      function CatPill({ active, onClick, children }) {
        return (
          <button
            onClick={onClick}
            style={{
              padding: "7px 16px",
              borderRadius: 99,
              border: "none",
              background: active ? "var(--black)" : "rgba(255,255,255,0.08)",
              color: active ? "#fff" : "rgba(255,255,255,0.65)",
              fontSize: 13,
              fontWeight: 600,
              cursor: "pointer",
              transition: "all 0.15s",
              whiteSpace: "nowrap",
              flexShrink: 0,
            }}
          >
            {children}
          </button>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
