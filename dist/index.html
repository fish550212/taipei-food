function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
  }, []);
  return [values, setTweak];
}

function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(16, window.innerWidth - w - 16);
    const maxBottom = Math.max(16, window.innerHeight - h - 16);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(16, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(16, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = { x: startRight - (ev.clientX - sx), y: startBottom - (ev.clientY - sy) };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-noncommentable="" style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks" onMouseDown={(e) => e.stopPropagation()} onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">{children}</div>
      </div>
    </>
  );
}

function TweakSection({ label, children }) { return <><div className="twk-sect">{label}</div>{children}</>; }
function TweakRow({ label, value, children, inline = false }) { return <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}><div className="twk-lbl"><span>{label}</span>{value != null && <span className="twk-val">{value}</span>}</div>{children}</div>; }
function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) { return <TweakRow label={label} value={`${value}${unit}`}><input type="range" className="twk-slider" min={min} max={max} step={step} value={value} onChange={(e) => onChange(Number(e.target.value))} /></TweakRow>; }
function TweakToggle({ label, value, onChange }) { return <div className="twk-row twk-row-h"><div className="twk-lbl"><span>{label}</span></div><button type="button" className="twk-toggle" data-on={value ? '1' : '0'} role="switch" aria-checked={!!value} onClick={() => onChange(!value)}><i /></button></div>; }
function TweakColor({ label, value, onChange }) { return <div className="twk-row twk-row-h"><div className="twk-lbl"><span>{label}</span></div><input type="color" className="twk-swatch" value={value} onChange={(e) => onChange(e.target.value)} /></div>; }
function TweakRadio({ label, value, options, onChange }) {
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;
  return (
    <TweakRow label={label}>
      <div className="twk-seg">
        <div className="twk-seg-thumb" style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`, width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => <button key={o.value} type="button" role="radio" aria-checked={o.value === value} onClick={() => onChange(o.value)}>{o.label}</button>)}
      </div>
    </TweakRow>
  );
}

Object.assign(window, { useTweaks, TweaksPanel, TweakSection, TweakRow, TweakSlider, TweakToggle, TweakColor, TweakRadio });
</script>

async function fetchWithRetry(url, options, retries = 5, backoff = 1000) {
  try {
    const response = await fetch(url, options);
    if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
    return await response.json();
  } catch (error) {
    if (retries > 0) {
      await new Promise(resolve => setTimeout(resolve, backoff));
      return fetchWithRetry(url, options, retries - 1, backoff * 2);
    }
    throw error;
  }
}

function parseCSV(text){
  const lines=text.trim().split("\n");
  if(lines.length<2)return[];
  const headers=lines[0].split(",").map(h=>h.trim().replace(/^"|"$/g,""));
  return lines.slice(1).map(line=>{
    const cols=[];let cur="",inQ=false;
    for(let i=0;i<line.length;i++){
      const c=line[i];
      if(c==='"'){inQ=!inQ;continue;}
      if(c===","&&!inQ){cols.push(cur);cur="";}else cur+=c;
    }
    cols.push(cur);
    const obj={};
    headers.forEach((h,i)=>{obj[h]=(cols[i]||"").trim();});
    return obj;
  }).filter(r=>r.name);
}

function AddModal({onClose,onAdd}){
  const CATS=["台式料理","日式料理","中式料理","韓式料理","泰式料理","義式料理","美式餐廳","咖啡廳","手搖飲料","早餐","火鍋","燒烤","海鮮","甜點","冰品","麵包烘焙","夜市小吃","在地小吃","牛肉麵","小籠包","拉麵","鐵板燒","居酒屋","餐酒館","素食/蔬食","健康餐盒","速食","生鮮超市","便利商店","藥妝保健","生活雜貨","伴手禮","創意料理","西式創意","藥膳湯品","其他"];
  const DISTS=["中正區","大安區","信義區","中山區","松山區","內湖區","士林區","萬華區","大同區","文山區","南港區","北投區","板橋區","三重區","中和區","永和區","新莊區","新店區","土城區","蘆洲區","樹林區","汐止區","三峽區","淡水區","林口區","五股區","泰山區","鶯歌區","八里區","深坑區","其他"];
  const EMOJIS={"台式料理":"🫕","日式料理":"🍱","中式料理":"🥢","韓式料理":"🥘","泰式料理":"🍲","義式料理":"🍝","美式餐廳":"🍔","咖啡廳":"☕","手搖飲料":"🧋","早餐":"🥣","火鍋":"🍲","燒烤":"🔥","海鮮":"🦐","甜點":"🍰","冰品":"🍧","麵包烘焙":"🥐","夜市小吃":"🧆","在地小吃":"🥟","牛肉麵":"🍜","小籠包":"🥟","拉麵":"🍜","鐵板燒":"🍳","居酒屋":"🍶","餐酒館":"🍷","素食/蔬食":"🥗","健康餐盒":"🍱","速食":"🍟","生鮮超市":"🛒","便利商店":"🏪","藥妝保健":"💊","生活雜貨":"🛍️","伴手禮":"🎁","創意料理":"🍽️","西式創意":"🍝","藥膳湯品":"🍖","其他":"🍴"};

  const [name,setName]=React.useState("");
  const [category,setCategory]=React.useState("");
  const [district,setDistrict]=React.useState("");
  const [rating,setRating]=React.useState("4.0");
  const [openHours,setOpenHours]=React.useState("");
  const [isOpen,setIsOpen]=React.useState(true);
  const [mapLink,setMapLink]=React.useState("");
  const [note,setNote]=React.useState("");
  const [errors,setErrors]=React.useState({});

  const [inputUrl, setInputUrl] = React.useState('');
  const [analyzing, setAnalyzing] = React.useState(false);
  const [insightLoading, setInsightLoading] = React.useState(false);
  const [aiInsight, setAiInsight] = React.useState(null);

  React.useEffect(()=>{
    const h=e=>{if(e.key==="Escape")onClose();};
    document.addEventListener("keydown",h);
    return()=>document.removeEventListener("keydown",h);
  },[onClose]);

  const handleUrlAnalyze = async () => {
    if (!inputUrl.trim()) return;
    setAnalyzing(true);
    try {
      const prompt = `任務：解析 Google Maps 網址並提取指定地點數據。
網址：${inputUrl}
輸出：純 JSON 格式，不得包含 Markdown。
JSON 結構要求：
{"name": "店家名稱", "category": "餐廳類型（請從以下選擇最接近的一項：台式料理, 日式料理, 中式料理, 韓式料理, 泰式料理, 義式料理, 美式餐廳, 咖啡廳, 手搖飲料, 早餐, 火鍋, 燒烤, 海鮮, 甜點, 冰品, 麵包烘焙, 夜市小吃, 在地小吃, 牛肉麵, 小籠包, 拉麵, 鐵板燒, 居酒屋, 餐酒館, 素食/蔬食, 健康餐盒, 速食, 生鮮超市, 便利商店, 藥妝保健, 生活雜貨, 伴手禮, 創意料理, 西式創意, 藥膳湯品, 其他）", "district": "行政區（請從以下選擇最接近的一項：中正區, 大安區, 信義區, 中山區, 松山區, 內湖區, 士林區, 萬華區, 大同區, 文山區, 南港區, 北投區, 板橋區, 三重區, 中和區, 永和區, 新莊區, 新店區, 土城區, 蘆洲區, 樹林區, 汐止區, 三峽區, 淡水區, 林口區, 五股區, 泰山區, 鶯歌區, 八里區, 深坑區, 其他）", "rating": "評分(數字)", "isOpen": "目前是否營業(布林值, true/false)", "openHours": "一週詳細營業時間（請完整列出週一至週日營業時間，並以換行符號 \\n 分隔）", "note": "簡短的店家介紹或筆記"}`;
      
      const data = await fetchWithRetry(`https://generativelanguage.googleapis.com/v1beta/models/${modelName}:generateContent?key=${apiKey}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          contents: [{ parts: [{ text: prompt }] }],
          tools: [{ "google_search": {} }],
          generationConfig: { responseMimeType: "application/json" }
        })
      });
      const result = JSON.parse(data.candidates[0].content.parts[0].text);
      if(result.name) setName(result.name);
      if(result.category && CATS.includes(result.category)) setCategory(result.category);
      if(result.district && DISTS.includes(result.district)) setDistrict(result.district);
      if(result.rating) setRating(result.rating.toString());
      if(typeof result.isOpen === 'boolean') setIsOpen(result.isOpen);
      if(result.openHours) setOpenHours(result.openHours);
      setMapLink(inputUrl);
      if(result.note) setNote(result.note);
    } catch (e) {
      console.error(e);
    } finally {
      setAnalyzing(false);
    }
  };

  const fetchAiInsight = async () => {
    if (!name) return;
    setInsightLoading(true);
    try {
      const prompt = `分析店家 "${name}" 的網路評價，總結 3 個優點與 2 個缺點，並給出一句話結論。請使用繁體中文。`;
      const data = await fetchWithRetry(`https://generativelanguage.googleapis.com/v1beta/models/${modelName}:generateContent?key=${apiKey}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }], tools: [{ "google_search": {} }] })
      });
      setAiInsight(data.candidates[0].content.parts[0].text);
    } catch (e) {
      setAiInsight("暫時無法分析評價。");
    } finally {
      setInsightLoading(false);
    }
  };

  function validate(){
    const e={};
    if(!name.trim())e.name="請填寫店家名稱";
    const r=parseFloat(rating);
    if(isNaN(r)||r<0||r>5)e.rating="評分需介於 0–5 之間";
    setErrors(e);
    return Object.keys(e).length===0;
  }

  function doConfirm(){
    if(!validate())return;
    const cat=category||"其他";
    onAdd({
      id:"u_"+Date.now(),
      name:name.trim(),
      district,
      category:cat,
      rating:parseFloat(rating).toFixed(1),
      opening_hours:openHours.trim()||"未填寫",
      is_open:isOpen?"TRUE":"FALSE",
      emoji:EMOJIS[cat]||"🍴",
      note: aiInsight ? `【AI 洞察】\n${aiInsight}\n\n【個人筆記】\n${note.trim()}` : note.trim(),
      map_link:mapLink.trim()||"#",
      source:"custom",
    });
    onClose();
  }

  const inputStyle=(err)=>({
    width:"100%",padding:"10px 12px",borderRadius:9,
    border:`1.5px solid ${err?"#F87171":"rgba(0,0,0,0.12)"}`,
    fontSize:13,background:"#F9F6F2",color:"var(--t1)",outline:"none",
    fontFamily:"inherit",transition:"border-color 0.14s",
  });
  const labelStyle={fontSize:11,fontWeight:700,color:"var(--t2)",display:"block",marginBottom:5,textTransform:"uppercase",letterSpacing:"0.06em"};
  const fieldWrap={marginBottom:13};

  return(
    <div onClick={onClose} style={{
      position:"fixed",inset:0,zIndex:700,
      background:"rgba(10,10,10,0.78)",backdropFilter:"blur(8px)",
      display:"flex",alignItems:"flex-end",justifyContent:"center",
      animation:"fadeIn 0.15s ease",
    }}>
      <div onClick={e=>e.stopPropagation()} style={{
        background:"var(--card)",borderRadius:"24px 24px 0 0",
        width:"100%",maxWidth:480,maxHeight:"92vh",display:"flex",flexDirection:"column",
        animation:"slideUp 0.24s cubic-bezier(0.22,1,0.36,1)",
        boxShadow:"0 -8px 40px rgba(0,0,0,0.22)",overflow:"hidden",
      }}>
        <div style={{display:"flex",justifyContent:"center",padding:"14px 0 0",flexShrink:0}}>
          <div style={{width:38,height:4,borderRadius:99,background:"rgba(0,0,0,0.1)"}}/>
        </div>
        <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",padding:"10px 20px 14px",flexShrink:0}}>
          <div>
            <div style={{fontSize:18,fontWeight:800,letterSpacing:"-0.02em"}}>新增餐廳</div>
            <div style={{fontSize:12,color:"var(--t3)",marginTop:2}}>手動填寫或透過 AI 快速解析</div>
          </div>
          <button onClick={onClose} style={{width:32,height:32,borderRadius:99,border:"1.5px solid rgba(0,0,0,0.1)",background:"transparent",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",color:"var(--t2)",flexShrink:0,marginTop:2}}><XIc s={13}/></button>
        </div>

        <div style={{padding:"0 20px 8px",overflowY:"auto",flex:1}}>
          <div style={{background:"rgba(232,39,42,0.05)",padding:15,borderRadius:16,marginBottom:20,border:"1px solid rgba(232,39,42,0.1)"}}>
            <label style={labelStyle}>貼上 Google Maps 網址快速填入</label>
            <div style={{display:"flex",gap:8}}>
              <input value={inputUrl} onChange={e=>setInputUrl(e.target.value)} placeholder="https://maps.app.goo.gl/..." style={{...inputStyle(false), flex:1}} />
              <button onClick={handleUrlAnalyze} disabled={analyzing} style={{padding:"0 15px",borderRadius:9,background:"var(--red)",color:"#fff",border:"none",fontWeight:700,cursor:"pointer",display:"flex",alignItems:"center"}}>
                {analyzing ? <Loader2 s={16}/> : <SparkIc s={16}/>}
              </button>
            </div>
          </div>

          <div style={fieldWrap}>
            <label style={labelStyle}>店家名稱 <span style={{color:"var(--red)"}}>*</span></label>
            <input value={name} onChange={e=>{setName(e.target.value);setErrors(p=>({...p,name:""}));}}
              placeholder="例：鼎泰豐信義店"
              style={inputStyle(errors.name)}
              onFocus={e=>e.target.style.borderColor="var(--red)"}
              onBlur={e=>e.target.style.borderColor=errors.name?"#F87171":"rgba(0,0,0,0.12)"}

            {errors.name&&<div style={{fontSize:11,color:"#DC2626",marginTop:4}}>{errors.name}</div>}
          </div>

          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:13}}>
            <div>
              <label style={labelStyle}>餐廳類型</label>
              <select value={category} onChange={e=>setCategory(e.target.value)}
                style={{...inputStyle(false),appearance:"none",backgroundImage:"url(\"data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6' viewBox='0 0 10 6'><path fill='rgba(0,0,0,.4)' d='M0 0h10L5 6z'/></svg>\")",backgroundRepeat:"no-repeat",backgroundPosition:"right 10px center",paddingRight:28}}>
                <option value="" disabled>請選擇</option>
                {CATS.map(c=><option key={c} value={c}>{c}</option>)}
              </select>
            </div>
            <div>
              <label style={labelStyle}>行政區</label>
              <select value={district} onChange={e=>setDistrict(e.target.value)}
                style={{...inputStyle(false),appearance:"none",backgroundImage:"url(\"data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6' viewBox='0 0 10 6'><path fill='rgba(0,0,0,.4)' d='M0 0h10L5 6z'/></svg>\")",backgroundRepeat:"no-repeat",backgroundPosition:"right 10px center",paddingRight:28}}>
                <option value="" disabled>請選擇</option>
                {DISTS.map(d=><option key={d} value={d}>{d}</option>)}
              </select>
            </div>
          </div>

          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:13}}>
            <div>
              <label style={labelStyle}>評分（0–5）<span style={{color:"var(--red)"}}>*</span></label>
              <input type="number" min="0" max="5" step="0.1" value={rating}
                onChange={e=>{setRating(e.target.value);setErrors(p=>({...p,rating:""}));}}

                onFocus={e=>e.target.style.borderColor="var(--red)"}
                onBlur={e=>e.target.style.borderColor=errors.rating?"#F87171":"rgba(0,0,0,0.12)"}

              {errors.rating&&<div style={{fontSize:11,color:"#DC2626",marginTop:4}}>{errors.rating}</div>}
            </div>
            <div>
              <label style={labelStyle}>目前狀態</label>
              <div style={{display:"flex",gap:6,marginTop:2}}>

                  <button key={String(v)} onClick={()=>setIsOpen(v)} style={{

                    background:isOpen===v?(v?"var(--green)":"var(--red)"):"rgba(0,0,0,0.07)",

                  }}>{v?"營業中":"休息中"}</button>
                ))}
              </div>
            </div>
          </div>

          {name && (
            <button onClick={fetchAiInsight} disabled={insightLoading} style={{width:"100%",padding:12,borderRadius:12,border:"1px solid var(--red)",background:"transparent",color:"var(--red)",fontWeight:800,marginBottom:15,display:"flex",alignItems:"center",justifyContent:"center",gap:8,cursor:"pointer"}}>

          {aiInsight && (
            <div style={{background:"#111",color:"#eee",padding:15,borderRadius:12,fontSize:12,lineHeight:1.6,marginBottom:15,whiteSpace:"pre-wrap"}}>
              <div style={{color:"var(--amber)",fontWeight:800,marginBottom:5,display:"flex",alignItems:"center",gap:5}}><SparkIc s={12}/> AI 洞察</div>

            <label style={labelStyle}>Google Maps 連結（可選）</label>

              onFocus={e=>e.target.style.borderColor="var(--red)"}
              onBlur={e=>e.target.style.borderColor="rgba(0,0,0,0.12)"}
            />

        </div>

        <div style={{padding:"12px 20px 36px",borderTop:"1px solid rgba(0,0,0,0.06)",flexShrink:0,background:"var(--card)"}}>

const TWEAK_DEFAULTS = {"accentColor": "#E8272A","cardRadius": 20,"showRatingFilter": true,"defaultView": "grid"};

function App(){
  const [tweaks,setTweak]=useTweaks(TWEAK_DEFAULTS);
  const [sheetData,setSheetData]=React.useState([]);
  const [customData,setCustomData]=React.useState([]);
  const [loading,setLoading]=React.useState(true);
  const [usingFallback,setUsingFallback]=React.useState(false);
  const [view,setView]=React.useState(tweaks.defaultView||"grid");
  const [search,setSearch]=React.useState("");
  const [ratingMin,setRatingMin]=React.useState(0);
  const [onlyOpen,setOnlyOpen]=React.useState(false);
  const [districtF,setDistrictF]=React.useState(new Set());
  const [categoryF,setCategoryF]=React.useState(new Set());
  const [filterOpen,setFilterOpen]=React.useState(false);
  const [detailR,setDetailR]=React.useState(null);
  const [showAdd,setShowAdd]=React.useState(false);
  const [gachaR,setGachaR]=React.useState(null);

  React.useEffect(()=>{
    try{const s=localStorage.getItem(LS_KEY);if(s)setCustomData(JSON.parse(s));}catch(e){}
    async function load(){
      try{
        const res=await fetch(SHEET_CSV_URL);
        if(!res.ok)throw new Error();
        const text=await res.text();
        const d=parseCSV(text);
        if(!d.length)throw new Error();
        setSheetData(d);
      }catch(e){setSheetData(FALLBACK);setUsingFallback(true);}
      finally{setLoading(false);}
    }
    load();
  },[]);

  React.useEffect(()=>{localStorage.setItem(LS_KEY,JSON.stringify(customData));},[customData]);
  React.useEffect(()=>{document.documentElement.style.setProperty("--red",tweaks.accentColor);},[tweaks.accentColor]);

  const allData=React.useMemo(()=>[...customData,...sheetData],[customData,sheetData]);
  const districts=React.useMemo(()=>[...new Set(allData.map(r=>r.district).filter(Boolean))].sort(),[allData]);
  const categories=React.useMemo(()=>[...new Set(allData.map(r=>r.category).filter(Boolean))].sort(),[allData]);

  const filtered=React.useMemo(()=>{
    const q=search.toLowerCase().trim();
    return allData.filter(r=>{
      if(q&&!((r.name||"").toLowerCase().includes(q)||(r.district||"").toLowerCase().includes(q)||(r.category||"").toLowerCase().includes(q)||(r.note||"").toLowerCase().includes(q)))return false;
      if(ratingMin>0&&parseFloat(r.rating)<ratingMin)return false;
      if(onlyOpen&&r.is_open!=="TRUE"&&r.is_open!==true)return false;
      if(districtF.size>0&&!districtF.has(r.district))return false;
      if(categoryF.size>0&&!categoryF.has(r.category))return false;
      return true;
    });
  },[allData,search,ratingMin,onlyOpen,districtF,categoryF]);

  function toggleSet(setter,val){setter(prev=>{const s=new Set(prev);s.has(val)?s.delete(val):s.add(val);return s;});}
  function clearFilters(){setSearch("");setRatingMin(0);setOnlyOpen(false);setDistrictF(new Set());setCategoryF(new Set());}
  function doGacha(){if(!filtered.length)return;setGachaR(filtered[Math.floor(Math.random()*filtered.length)]);}
  function rerollGacha(){if(!filtered.length)return;setGachaR(filtered[Math.floor(Math.random()*filtered.length)]);}

  const activeFilters=(ratingMin>0?1:0)+(onlyOpen?1:0)+districtF.size+categoryF.size;
  const DECOS = [
    ["🌶️","8%","1.5%","-30deg",2.2,0.28],["🧄","22%","2%","18deg",1.8,0.22],["🥬","42%","0.5%","25deg",2.4,0.20],
    ["🍋","62%","1.5%","-12deg",1.9,0.24],["🌿","80%","2%","-40deg",2.1,0.22],["🍅","5%","91%","20deg",2.0,0.26],
    ["🥦","25%","93%","-18deg",2.3,0.20],["🫑","48%","92%","38deg",2.0,0.22],["🍄","68%","94%","-22deg",1.8,0.20],
    ["🌰","85%","92%","-28deg",1.9,0.24],["🥕","2%","6%","15deg",2.5,0.22],["🧅","2%","88%","-15deg",2.2,0.20],
    ["🫛","93%","5%","35deg",2.0,0.22],["🍜","92%","89%","-10deg",2.1,0.20],
  ];

  return(
    <div style={{minHeight:"100vh",background:"var(--bg)",display:"flex",flexDirection:"column",position:"relative"}}>
      {DECOS.map(([em,top,left,rot,scale,op],i)=>(
        <div key={"d"+i} aria-hidden="true" style={{position:"fixed",top,left,fontSize:50,transform:"rotate("+rot+") scale("+scale+")",opacity:op,pointerEvents:"none",zIndex:0,filter:"blur(0.4px) saturate(0.7)",userSelect:"none",lineHeight:1}}>{em}</div>
      ))}
      <nav style={{
        position:"sticky",top:0,zIndex:300,
        background:"rgba(24,24,24,0.92)",backdropFilter:"blur(20px)",WebkitBackdropFilter:"blur(20px)",

                <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                  {districts.map(d=>(
                    <button key={d} onClick={()=>toggleSet(setDistrictF,d)} style={{padding:"4px 11px",borderRadius:99,border:"none",background:districtF.has(d)?"var(--red)":"rgba(255,255,255,0.08)",color:districtF.has(d)?"#fff":"rgba(255,255,255,0.6)",fontSize:12,fontWeight:500,cursor:"pointer"}}>{d}</button>
                  ))}
                </div>
              </div>
              {activeFilters>0&&(
                <div style={{display:"flex",alignItems:"flex-end"}}>
                  <button onClick={clearFilters} style={{display:"flex",alignItems:"center",gap:4,padding:"5px 12px",borderRadius:99,border:"1px solid rgba(255,255,255,0.15)",background:"transparent",fontSize:11,color:"rgba(255,255,255,0.5)",cursor:"pointer"}}><XIc s={10}/> 清除篩選</button>
                </div>
              )}
            </div>
          </div>
        )}
      </div>
      <main style={{flex:1,maxWidth:1100,margin:"0 auto",padding:"22px 20px 72px",width:"100%"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18}}>
          <div style={{fontSize:12,color:"rgba(255,255,255,0.35)",whiteSpace:"nowrap"}}>
            {loading?"讀取中…":<>顯示 <strong style={{color:"rgba(255,255,255,0.7)"}}>{filtered.length}</strong> / {allData.length} 筆{usingFallback&&<span style={{color:"rgba(255,149,0,0.8)",marginLeft:6}}>（示範資料）</span>}</>}
          </div>
        </div>
        {loading&&(
          <div style={{textAlign:"center",padding:"5rem 1rem"}}>
            <div style={{width:30,height:30,borderRadius:99,border:"3px solid rgba(255,255,255,0.1)",borderTopColor:"var(--red)",animation:"spin 0.7s linear infinite",margin:"0 auto 14px"}}/>
            <div style={{fontSize:13,color:"rgba(255,255,255,0.4)"}}>讀取資料中…</div>
          </div>
        )}
        {!loading&&filtered.length===0&&(
          <div style={{textAlign:"center",padding:"4rem 1rem",background:"rgba(255,255,255,0.04)",borderRadius:20,border:"1.5px dashed rgba(255,255,255,0.1)"}}>
            <div style={{fontSize:42,marginBottom:14}}>🔍</div>
            <div style={{fontSize:17,fontWeight:700,color:"#fff",marginBottom:6}}>找不到符合的餐廳</div>
            <div style={{fontSize:13,color:"rgba(255,255,255,0.4)",marginBottom:22}}>換個關鍵字，或是放寬篩選條件</div>
            <button onClick={clearFilters} style={{padding:"10px 24px",borderRadius:10,background:"var(--red)",color:"#fff",border:"none",fontSize:13,fontWeight:700,cursor:"pointer",boxShadow:"0 4px 14px rgba(232,39,42,0.28)"}}>清除所有篩選</button>
          </div>
        )}
        {!loading&&filtered.length>0&&view==="grid"&&(
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(260px,1fr))",gap:16}}>
            {filtered.map((r)=>(<GridCard key={r.id} r={r} onOpen={setDetailR}/>))}
          </div>
        )}
        {!loading&&filtered.length>0&&view==="list"&&(
          <div style={{display:"flex",flexDirection:"column",gap:9}}>
            {filtered.map((r)=>(<ListItem key={r.id} r={r} onOpen={setDetailR}/>))}
          </div>
        )}
      </main>
      {detailR&&<DetailModal r={detailR} onClose={()=>setDetailR(null)} onDelete={id=>{setCustomData(p=>p.filter(r=>r.id!==id));setDetailR(null);}}/>}
      {showAdd&&<AddModal onClose={()=>setShowAdd(false)} onAdd={r=>setCustomData(p=>[r,...p])}/>}
      {gachaR&&<GachaOverlay r={gachaR} onClose={()=>setGachaR(null)} onReroll={rerollGacha}/>}
      <TweaksPanel>
        <TweakSection label="品牌色彩"><TweakColor label="Accent 色" value={tweaks.accentColor} onChange={v=>setTweak("accentColor",v)}/></TweakSection>
        <TweakSection label="版面"><TweakSlider label="卡片圓角" min={8} max={28} step={2} value={tweaks.cardRadius} onChange={v=>setTweak("cardRadius",v)}/><TweakRadio label="預設視圖" value={tweaks.defaultView} options={[{value:"grid",label:"卡片"},{value:"list",label:"列表"}]} onChange={v=>setTweak("defaultView",v)}/></TweakSection>
        <TweakSection label="篩選器"><TweakToggle label="顯示評分快篩" value={tweaks.showRatingFilter} onChange={v=>setTweak("showRatingFilter",v)}/></TweakSection>
      </TweaksPanel>
      <style>{`@media(max-width:600px){.hide-sm{display:none!important}}`}</style>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
